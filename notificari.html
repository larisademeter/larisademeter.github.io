<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notificările Mele | L.D. Service Medical</title>
    <link rel="stylesheet" href="style.css">
</head>
<body style="background-color: #f7f5f9;">

    <header>
        <div class="container header-content">
            <a href="index.html" class="brand">
                <img src="logo.png" alt="L.D. Service Medical" class="logo">
            </a>
            <button class="menu-toggle" aria-label="Meniu">
                <span class="bar"></span>
                <span class="bar"></span>
                <span class="bar"></span>
            </button>
            <nav class="main-nav">
                <a href="index.html">Acasă</a>
                <a href="tichete.html" id="navTicheteBtn">Tichetele Mele</a>
                
                <a href="notificari.html" class="notification-bell-container">
                    <span class="notification-bell">🔔</span>
                    <span id="bellBadge" class="notification-badge nav-hidden">0</span>
                </a>

                <span id="userEmail" style="margin: 0 15px; font-weight: bold; color: #7b2cbf; font-size: 0.95em;">Se încarcă...</span>
                
                <div class="nav-auth">
                    <button id="btnDeconectare" class="btn-nav-home">Deconectare</button>
                    <a href="contact.html" class="btn-nav-contact">Contact</a>
                </div>
            </nav>
        </div>
    </header>

    <main class="section">
        <div class="container" style="max-width: 800px; margin-top: 40px; min-height: 60vh;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; flex-wrap: wrap; gap: 15px;">
                <div>
                    <h2 style="color: #4a154b; margin-bottom: 4px; font-weight: 800;">Notificările Mele</h2>
                    <p style="color: #666; font-size: 1.05em;">Aici găsești noutățile legate de tichetele tale de service.</p>
                </div>
                <button id="btnMarcheazaCitite" class="btn-nav-home" style="padding: 10px 20px; font-size: 0.8rem;">Marchează toate ca citite</button>
            </div>
            
            <div id="notificariContainer">
                <p style="color: #888; text-align: center;">Se încarcă notificările...</p>
            </div>
        </div>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 L.D. Service Medical. Partenerul tău în tehnologie medicală.</p>
        </div>
    </footer>

    <script>
        const toggle = document.querySelector('.menu-toggle');
        const nav = document.querySelector('.main-nav');
        toggle.addEventListener('click', () => {
            toggle.classList.toggle('active');
            nav.classList.toggle('active');
        });
    </script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, query, where, orderBy, onSnapshot, writeBatch, doc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDJkNtiqJv5MXUe1XNPJf4lBI3KSl9ns0w",
            authDomain: "proiect-de-diploma-larisa.firebaseapp.com",
            projectId: "proiect-de-diploma-larisa",
            storageBucket: "proiect-de-diploma-larisa.firebasestorage.app",
            messagingSenderId: "1080817521080",
            appId: "1:1080817521080:web:329b2b604d2cd4056bbf4d",
            measurementId: "G-F0HM8NZCJ8"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let userLogat = null;
        let documenteNotificariIncarcate = [];

        onAuthStateChanged(auth, (user) => {
            if (user) {
                userLogat = user;
                document.getElementById('userEmail').innerText = user.email;
                incarcaNotificari(user);
            } else {
                window.location.href = "login.html";
            }
        });

        // Încarcă și ascultă notificările utilizatorului în timp real
        function incarcaNotificari(user) {
            const container = document.getElementById('notificariContainer');
            const notificariRef = collection(db, "notificari");
            
            // Receptăm notificările destinate utilizatorului curent, ordonate descrescător după dată
            const q = query(notificariRef, where("destinatarId", "==", user.uid), orderBy("data", "desc"));

            onSnapshot(q, (querySnapshot) => {
                container.innerHTML = "";
                documenteNotificariIncarcate = [];
                let necititeCount = 0;

                if (querySnapshot.empty) {
                    container.innerHTML = `
                        <div style="background: white; padding: 50px; border-radius: 16px; text-align: center; border: 1px solid #e1d5f2; color: #7b2cbf;">
                            <span style="font-size: 2.5em; display:block; margin-bottom:10px;">📭</span>
                            Nu ai nicio notificare primită.
                        </div>`;
                    document.getElementById('bellBadge').classList.add('nav-hidden');
                    return;
                }

                querySnapshot.forEach((docSnap) => {
                    const dateNotificare = docSnap.data();
                    documenteNotificariIncarcate.push({ id: docSnap.id, ...dateNotificare });

                    const item = document.createElement('div');
                    const esteCitita = dateNotificare.citita === true;
                    
                    item.className = `notification-item ${esteCitita ? '' : 'unread'}`;

                    if (!esteCitita) necititeCount++;

                    item.innerHTML = `
                        <div>
                            <p style="margin: 0 0 5px 0; color: #1e1b4b; font-size: 1.05em;">${dateNotificare.mesaj}</p>
                            <span style="font-size: 0.8em; color: #8c7b99; font-weight: 600;">📅 ${dateNotificare.dataFormata || ''}</span>
                        </div>
                        ${!esteCitita ? '<span style="background: #ec4899; width: 8px; height: 8px; border-radius: 50%; display: inline-block;"></span>' : ''}
                    `;
                    container.appendChild(item);
                });

                // Actualizăm clopoțelul din header-ul paginii curente
                const badge = document.getElementById('bellBadge');
                if (necititeCount > 0) {
                    badge.innerText = necititeCount;
                    badge.classList.remove('nav-hidden');
                } else {
                    badge.classList.add('nav-hidden');
                }
            });
        }

        // Marcare toate ca citite folosind un Batch Write (tranzacție rapidă în Firestore)
        document.getElementById('btnMarcheazaCitite').addEventListener('click', async () => {
            if (documenteNotificariIncarcate.length === 0) return;

            const batch = writeBatch(db);
            let modificatCeva = false;

            documenteNotificariIncarcate.forEach((notif) => {
                if (notif.citita === false) {
                    const docRef = doc(db, "notificari", notif.id);
                    batch.update(docRef, { citita: true });
                    modificatCeva = true;
                }
            });

            if (modificatCeva) {
                try {
                    await batch.commit();
                    console.log("Toate notificările au fost marcate ca citite.");
                } catch (error) {
                    console.error("Eroare la marcarea notificărilor ca citite:", error);
                }
            }
        });

        // Delogare
        document.getElementById('btnDeconectare').addEventListener('click', () => {
            signOut(auth).then(() => {
                window.location.replace("index.html");
            }).catch((error) => {
                console.error("Eroare delogare:", error);
            });
        });
    </script>
</body>
</html>
