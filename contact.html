<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | L.D. Service Medical</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="container header-content">
            <a href="index.html" class="brand">
                <img src="logo.png" alt="L.D. Service Medical" class="logo">
            </a>
            <button class="menu-toggle" aria-label="Meniu">
                <span class="bar"></span>
                <span class="bar"></span>
                <span class="bar"></span>
            </button>
            <nav class="main-nav">
                <a href="index.html#servicii">Servicii</a>
                <div class="nav-auth">
                    <a href="login.html" class="btn-login">Log In</a>
                    <a href="index.html" class="btn-nav-home">Acasă</a>
                </div>
            </nav>
        </div>
    </header>

    <main class="section bg-contact">
        <div class="container">
            <div class="form-wrapper">
                <h2 class="form-title">Solicită Intervenție Tehnică</h2>
                <p class="subtitle-form">Un tehnician va prelua solicitarea ta în cel mai scurt timp posibil.</p>
                
                <form id="contactForm" class="contact-form">
                    
                    <div class="form-group">
                        <label for="clinica">Nume Clinică / Cabinet</label>
                        <input type="text" id="clinica" name="clinica" placeholder="Ex: Spitalul Municipal..." required>
                    </div>

                    <div class="form-group">
                        <label for="sectie">Secție <span class="optional">(opțional)</span></label>
                        <input type="text" id="sectie" name="sectie" placeholder="Ex: Cardiologie, ATI, Primiri Urgențe">
                    </div>

                    <div class="form-group">
                        <label for="motiv">Motiv Intervenție</label>
                        <select id="motiv" name="motiv" required>
                            <option value="" disabled selected>Alege motivul...</option>
                            <option value="service">Service (Reparație defect)</option>
                            <option value="mentenanta">Mentenanță periodică (Verificare)</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="echipament">Tip Echipament</label>
                        <select id="echipament" name="echipament" required>
                            <option value="" disabled selected>Alege echipamentul...</option>
                            <option value="injectomat">Injectomat</option>
                            <option value="electrocauter">Electrocauter</option>
                            <option value="monitor_triaj">Monitor triaj</option>
                            <option value="infuzomat">Infuzomat</option>
                            <option value="ploscar">Ploscar</option>
                            <option value="oxigen">Instalație de oxigen</option>
                            <option value="altul">Altul...</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="mesaj">Detalii suplimentare</label>
                        <textarea id="mesaj" name="mesaj" rows="4" placeholder="Descrieți defectul sau specificați seria aparatului..."></textarea>
                    </div>

                    <button type="submit" id="submitBtn" class="btn-full">Trimite Solicitarea</button>
                </form>
            </div>
        </div>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 L.D. Service Medical. Partenerul tău în tehnologie medicală.</p>
        </div>
    </footer>

    <script type="module">
        // Importă modulele Firebase de pe CDN
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // Configurația ta Firebase (Datele din screenshot-ul tău)
        const firebaseConfig = {
            apiKey: "AIzaSyD...", // Completează aici cheia ta completă dacă lipsește ceva
            authDomain: "proiect-de-diploma-larisa.firebaseapp.com",
            projectId: "proiect-de-diploma-larisa",
            storageBucket: "proiect-de-diploma-larisa.appspot.com",
            messagingSenderId: "1080817521080",
            appId: "1:1080817521080:web:329b2b604d2cd4056bbf4d"
        };

        // Inițializează Firebase
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Meniul Mobile (Codul tău original)
        const toggle = document.querySelector('.menu-toggle');
        const nav = document.querySelector('.main-nav');
        toggle.addEventListener('click', () => {
            toggle.classList.toggle('active');
            nav.classList.toggle('active');
        });

        // Trimitere Formular către Firestore
        const contactForm = document.getElementById('contactForm');
        
        contactForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const submitBtn = document.getElementById('submitBtn');
            submitBtn.innerText = "Se trimite...";
            submitBtn.disabled = true;

            try {
                // Colectăm datele
                const docRef = await addDoc(collection(db, "interventii"), {
                    clinica: document.getElementById('clinica').value,
                    sectie: document.getElementById('sectie').value,
                    motiv: document.getElementById('motiv').value,
                    echipament: document.getElementById('echipament').value,
                    mesaj: document.getElementById('mesaj').value,
                    data_creare: new Date().toISOString()
                });

                alert("Solicitarea a fost înregistrată! Un tehnician te va contacta.");
                contactForm.reset();
            } catch (error) {
                console.error("Eroare la trimitere: ", error);
                alert("A apărut o eroare. Te rugăm să încerci din nou.");
            } finally {
                submitBtn.innerText = "Trimite Solicitarea";
                submitBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
