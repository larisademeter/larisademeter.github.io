<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | L.D. Service Medical</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="container header-content">
            <a href="index.html" class="brand">
                <img src="logo.png" alt="L.D. Service Medical" class="logo">
            </a>
            <button class="menu-toggle" aria-label="Meniu">
                <span class="bar"></span>
                <span class="bar"></span>
                <span class="bar"></span>
            </button>
            <nav class="main-nav">
                <a href="index.html#servicii">Servicii</a>
                <a href="tichete.html" id="navTicheteBtn" class="nav-hidden">Tichetele Mele</a>
                
                <div class="nav-auth">
                    <a href="login.html" id="navLogInBtn" class="btn-login nav-hidden">Log In</a>
                    <button id="navDeconectareBtn" class="btn-nav-home nav-hidden">Deconectare</button>
                    <a href="index.html" class="btn-nav-contact">Acasă</a>
                    
                    <a href="notificari.html" id="navBellBtn" class="notification-bell-container nav-hidden">
                        <span class="notification-bell">🔔</span>
                        <span id="bellBadge" class="notification-badge nav-hidden">0</span>
                    </a>
                </div>
            </nav>
        </div>
    </header>

    <main class="section bg-contact">
        <div class="container">
            <div class="form-wrapper">
                <h2 class="form-title">Solicită Intervenție Tehnică</h2>
                
                <p id="authCheckMessage" style="text-align: center; font-weight: bold; color: #8b5cf6;">
                    Se verifică conexiunea securizată...
                </p>
                
                <form id="contactForm" class="contact-form" style="display: none;">
                    <p class="subtitle-form">Un tehnician va prelua solicitarea ta în cel mai scurt timp posibil.</p>
                    
                    <div class="form-group">
                        <label for="clinica">Nume Clinică / Cabinet</label>
                        <input type="text" id="clinica" name="clinica" placeholder="Ex: Spitalul Municipal..." required>
                    </div>

                    <div class="form-group">
                        <label for="sectie">Secție <span class="optional">(opțional)</span></label>
                        <input type="text" id="sectie" name="sectie" placeholder="Ex: Cardiologie, ATI, Primiri Urgențe">
                    </div>

                    <div class="form-group">
                        <label for="motiv">Motiv Intervenție</label>
                        <select id="motiv" name="motiv" required>
                            <option value="" disabled selected>Alege motivul...</option>
                            <option value="service">Service (Reparație defect)</option>
                            <option value="mentenanta">Mentenanță periodică (Verificare)</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="echipament">Tip Echipament</label>
                        <select id="echipament" name="echipament" required>
                            <option value="" disabled selected>Alege echipamentul...</option>
                            <option value="injectomat">Injectomat</option>
                            <option value="electrocauter">Electrocauter</option>
                            <option value="monitor_triaj">Monitor triaj</option>
                            <option value="infuzomat">Infuzomat</option>
                            <option value="ploscar">Ploscar</option>
                            <option value="oxigen">Instalație de oxigen</option>
                            <option value="altul">Altul...</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="mesaj">Detalii suplimentare</label>
                        <textarea id="mesaj" name="mesaj" rows="4" placeholder="Descrieți defectul sau specificați seria aparatului..."></textarea>
                    </div>

                    <button type="submit" id="submitBtn" class="btn-full">Trimite Solicitarea</button>
                </form>
            </div>
        </div>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 L.D. Service Medical. Partenerul tău în tehnologie medicală.</p>
        </div>
    </footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, query, where, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDJkNtiqJv5MXUe1XNPJf4lBI3KSl9ns0w",
            authDomain: "proiect-de-diploma-larisa.firebaseapp.com",
            projectId: "proiect-de-diploma-larisa",
            storageBucket: "proiect-de-diploma-larisa.firebasestorage.app",
            messagingSenderId: "1080817521080",
            appId: "1:1080817521080:web:329b2b604d2cd4056bbf4d",
            measurementId: "G-F0HM8NZCJ8"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const toggle = document.querySelector('.menu-toggle');
        const nav = document.querySelector('.main-nav');
        if(toggle && nav) {
            toggle.addEventListener('click', () => {
                toggle.classList.toggle('active');
                nav.classList.toggle('active');
            });
        }

        const contactForm = document.getElementById('contactForm');
        const authCheckMessage = document.getElementById('authCheckMessage');
        const submitBtn = document.getElementById('submitBtn');
        
        const navLogInBtn = document.getElementById('navLogInBtn');
        const navTicheteBtn = document.getElementById('navTicheteBtn');
        const navDeconectareBtn = document.getElementById('navDeconectareBtn');
        const navBellBtn = document.getElementById('navBellBtn');
        
        let logatUserId = null;
        let ascultatorBadge = null;

        onAuthStateChanged(auth, (user) => {
            if (user) {
                if (navLogInBtn) navLogInBtn.classList.add('nav-hidden');
                if (navTicheteBtn) navTicheteBtn.classList.remove('nav-hidden');
                if (navDeconectareBtn) navDeconectareBtn.classList.remove('nav-hidden');
                if (navBellBtn) navBellBtn.classList.remove('nav-hidden');

                logatUserId = user.uid;
                authCheckMessage.style.display = "none";
                contactForm.style.display = "block";

                // Monitorizare badge notificări în timp real pe pagina de Contact
                const notificariRef = collection(db, "notificari");
                const q = query(notificariRef, where("destinatarId", "==", user.uid), where("citita", "==", false));
                
                ascultatorBadge = onSnapshot(q, (querySnapshot) => {
                    const badge = document.getElementById('bellBadge');
                    const necititeCount = querySnapshot.size;
                    
                    if (badge) {
                        if (necititeCount > 0) {
                            badge.innerText = necititeCount;
                            badge.classList.remove('nav-hidden');
                        } else {
                            badge.classList.add('nav-hidden');
                        }
                    }
                });
            } else {
                if (navLogInBtn) navLogInBtn.classList.remove('nav-hidden');
                if (navTicheteBtn) navTicheteBtn.classList.add('nav-hidden');
                if (navDeconectareBtn) navDeconectareBtn.classList.add('nav-hidden');
                if (navBellBtn) navBellBtn.classList.add('nav-hidden');

                if (ascultatorBadge) {
                    ascultatorBadge();
                    ascultatorBadge = null;
                }

                alert("Pentru a trimite o solicitare de intervenție și a urmări stadiul ei, te rugăm să te conectezi mai întâi în cont.");
                window.location.replace("login.html");
            }
        });

        if (navDeconectareBtn) {
            navDeconectareBtn.addEventListener('click', () => {
                signOut(auth).then(() => {
                    window.location.replace("index.html");
                }).catch((error) => {
                    console.error("Eroare la deconectare:", error);
                });
            });
        }

        if(contactForm) {
            contactForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                
                submitBtn.innerText = "Se trimite...";
                submitBtn.disabled = true;

                try {
                    await addDoc(collection(db, "interventii"), {
                        clinica: document.getElementById('clinica').value,
                        sectie: document.getElementById('sectie').value,
                        motiv: document.getElementById('motiv').value,
                        echipament: document.getElementById('echipament').value,
                        mesaj: document.getElementById('mesaj').value,
                        data_solicitare: new Date().toLocaleString('ro-RO'),
                        status: "Nouă",
                        userId: logatUserId
                    });

                    alert("Succes! Solicitarea ta a fost trimisă.");
                    contactForm.reset();

                    setTimeout(() => {
                        window.location.replace("tichete.html");
                    }, 500);

                } catch (error) {
                    console.error("Eroare:", error);
                    alert("Eroare la trimitere. Contactați administratorul.");
                    submitBtn.innerText = "Trimite Solicitarea";
                    submitBtn.disabled = false;
                }
            });
        }
    </script>
</body>
</html>
