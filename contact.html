<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Solicită Intervenție | L.D. Service Medical</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header>
    <div class="container header-content">
      <a href="index.html" class="brand">
        <img src="logo.png" alt="L.D. Service Medical" class="logo" />
      </a>
      <nav class="main-nav">
        <a href="index.html">Acasă</a>
        <a href="index.html#servicii">Servicii</a>
        <a href="contact.html" class="btn-nav">Contact</a>
      </nav>
    </div>
  </header>

  <main class="section bg-light">
    <div class="container">
      <div class="form-wrapper">
        <h2>Solicită Intervenție Tehnică</h2>
        <p>Completează formularul de mai jos și un tehnician te va contacta în cel mai scurt timp.</p>
        
        <form action="#" method="POST" class="contact-form">
          <div class="form-group">
            <label for="nume">Nume Clinică / Cabinet</label>
            <input type="text" id="nume" name="nume" placeholder="Ex: Clinica Medicală Pro" required>
          </div>

          <div class="form-group">
            <label for="telefon">Număr de Telefon</label>
            <input type="tel" id="telefon" name="telefon" placeholder="07xx xxx xxx" required>
          </div>

          <div class="form-group">
            <label for="echipament">Tip Echipament</label>
            <select id="echipament" name="echipament">
              <option value="ecograf">Ecograf</option>
              <option value="monitor">Monitor Funcții Vitale</option>
              <option value="electrocauter">Electrocauter</option>
              <option value="altul">Altul (specificați în mesaj)</option>
            </select>
          </div>

          <div class="form-group">
            <label for="mesaj">Descrierea Problemei</label>
            <textarea id="mesaj" name="mesaj" rows="5" placeholder="Descrieți pe scurt defectul constatat..." required></textarea>
          </div>

          <button type="submit" class="btn btn-full">Trimite Solicitarea</button>
        </form>
      </div>
    </div>
  </main>

  <footer>
    <div class="container">
      <p>&copy; 2024 L.D. Service Medical. Toate drepturile rezervate.</p>
    </div>
  </footer>

</body>
</html>
