<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tichetele Mele | L.D. Service Medical</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="container header-content">
            <a href="index.html" class="brand">
                <img src="logo.png" alt="L.D. Service Medical" class="logo">
            </a>
            <button class="menu-toggle" aria-label="Meniu">
                <span class="bar"></span>
                <span class="bar"></span>
                <span class="bar"></span>
            </button>
            <nav class="main-nav">
                <a href="index.html">Acasă</a>
                <span id="userEmail" style="margin: 0 15px; font-weight: bold; color: #00766c; font-size: 0.9em;">Se încarcă...</span>
                <button id="btnDeconectare" class="btn-nav-contact" style="background-color: #d9534f; border: none; cursor: pointer; padding: 8px 15px; border-radius: 4px; color: white;">Deconectare</button>
            </nav>
        </div>
    </header>

    <main class="section">
        <div class="container" style="max-width: 800px; margin-top: 40px; min-height: 60vh;">
            <h2 style="color: #333; margin-bottom: 10px;">Intervențiile și Tichetele Mele</h2>
            <p style="color: #666; margin-bottom: 20px;">Mai jos sunt afișate solicitările de service asociate contului tău.</p>
            
            <div id="ticheteContainer">
                <p style="color: #888;">Se încarcă tichetele tale...</p>
            </div>
        </div>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 L.D. Service Medical. Partenerul tău în tehnologie medicală.</p>
        </div>
    </footer>

    <script>
        const toggle = document.querySelector('.menu-toggle');
        const nav = document.querySelector('.main-nav');
        toggle.addEventListener('click', () => {
            toggle.classList.toggle('active');
            nav.classList.toggle('active');
        });
    </script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, query, where, getDocs, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // Configurația ta oficială Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyDJkNtiqJv5MXUe1XNPJf4lBI3KSl9ns0w",
            authDomain: "proiect-de-diploma-larisa.firebaseapp.com",
            projectId: "proiect-de-diploma-larisa",
            storageBucket: "proiect-de-diploma-larisa.firebasestorage.app",
            messagingSenderId: "1080817521080",
            appId: "1:1080817521080:web:329b2b604d2cd4056bbf4d",
            measurementId: "G-F0HM8NZCJ8"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let esteTehnicianSauAdmin = false;

        // Verificăm dacă utilizatorul este conectat
        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('userEmail').innerText = user.email;
                determinaRolSiIncarca(user);
            } else {
                window.location.href = "login.html";
            }
        });

        // Determinăm rolul
        async function determinaRolSiIncarca(user) {
            const email = user.email.toLowerCase();
            const ticheteRef = collection(db, "interventii");
            let q;

            // Verificăm dacă utilizatorul curent are drepturi de modificare (tehnician sau admin)
            if (email === "tehnician1@licenta.ro" || email === "tehnician2@licenta.ro" || email === "admin@licenta.ro") {
                esteTehnicianSauAdmin = true;
            } else {
                esteTehnicianSauAdmin = false;
            }

            if (email === "tehnician1@licenta.ro") {
                q = query(ticheteRef, where("echipament", "in", ["injectomat", "electrocauter", "monitor_triaj"]));
            } else if (email === "tehnician2@licenta.ro") {
                q = query(ticheteRef, where("echipament", "in", ["infuzomat", "ploscar", "oxigen"]));
            } else if (email === "admin@licenta.ro") {
                q = query(ticheteRef);
            } else {
                q = query(ticheteRef, where("userId", "==", user.uid));
            }

            afiseazaTichete(q);
        }

        // Afișăm tichetele și adăugăm opțiunea de schimbare a statusului pentru tehnicieni/admin
        async function afiseazaTichete(interogare) {
            try {
                const container = document.getElementById('ticheteContainer');
                const querySnapshot = await getDocs(interogare);

                container.innerHTML = "";

                if (querySnapshot.empty) {
                    container.innerHTML = `
                        <div style="background: #f9f9f9; padding: 30px; border-radius: 8px; text-align: center; border: 1px dashed #ccc; color: #666;">
                            Nu există nicio intervenție înregistrată în această secțiune.
                        </div>`;
                    return;
                }

                querySnapshot.forEach((docSnap) => {
                    const dateTichet = docSnap.data();
                    const card = document.createElement('div');
                    card.style.cssText = "background: #fff; padding: 20px; margin-bottom: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border-left: 5px solid #00766c; border-top: 1px solid #f0f0f0; border-right: 1px solid #f0f0f0; border-bottom: 1px solid #f0f0f0;";
                    
                    const statusActual = dateTichet.status || 'În așteptare';
                    
                    // Stabilim culoarea badge-ului de status în funcție de stadiu
                    let statusColor = "#137333"; // verde pentru rezolvată / nouă
                    let statusBg = "#e6f4ea";
                    if (statusActual === "În curs de rezolvare") {
                        statusColor = "#b06000"; // portocaliu
                        statusBg = "#fef7e0";
                    } else if (statusActual === "Nouă") {
                        statusColor = "#1a73e8"; // albastru
                        statusBg = "#e8f0fe";
                    }

                    // Construim elementul vizual de status: text simplu pentru clienți SAU meniu derulant (select) pentru tehnicieni/admin
                    let statusElementHTML = "";
                    if (esteTehnicianSauAdmin) {
                        statusElementHTML = `
                            <div style="display: flex; align-items: center; gap: 8px;">
                                <label style="font-size: 0.85em; font-weight: bold; color: #666;">Schimbă Status:</label>
                                <select class="status-select" data-id="${docSnap.id}" style="padding: 5px 10px; border-radius: 4px; border: 1px solid #ccc; font-weight: bold; background: #fff; cursor: pointer;">
                                    <option value="Nouă" ${statusActual === "Nouă" ? "selected" : ""}>Nouă</option>
                                    <option value="În curs de rezolvare" ${statusActual === "În curs de rezolvare" ? "selected" : ""}>În curs de rezolvare</option>
                                    <option value="Rezolvată" ${statusActual === "Rezolvată" ? "selected" : ""}>Rezolvată</option>
                                </select>
                            </div>
                        `;
                    } else {
                        statusElementHTML = `
                            <span style="background: ${statusBg}; color: ${statusColor}; padding: 4px 10px; border-radius: 50px; font-size: 0.85em; font-weight: bold;">
                                Status: ${statusActual}
                            </span>
                        `;
                    }

                    card.innerHTML = `
                        <div style="display: flex; justify-content: space-between; align-items: start; margin-bottom: 15px; flex-wrap: wrap; gap: 10px;">
                            <h3 style="margin: 0; color: #333; font-size: 1.25em;">Echipament: ${dateTichet.echipament || 'Nespecificat'}</h3>
                            ${statusElementHTML}
                        </div>
                        <p style="margin: 10px 0; color: #555; line-height: 1.5;"><strong>Descriere problemă:</strong> ${dateTichet.mesaj || 'Fără descriere.'}</p>
                        <div style="margin-top: 15px; padding-top: 10px; border-top: 1px solid #fafafa; display: flex; justify-content: space-between; font-size: 0.8em; color: #999;">
                            <span>ID Solicitare: ${docSnap.id}</span>
                            <span>Spital/Clinică: ${dateTichet.clinica || 'Nespecificat'}</span>
                        </div>
                    `;
                    container.appendChild(card);
                });

                // Adăugăm eveniment de schimbare în baza de date pentru toate meniurile derulante randate
                document.querySelectorAll('.status-select').forEach(select => {
                    select.addEventListener('change', async (e) => {
                        const docId = e.target.getAttribute('data-id');
                        const noulStatus = e.target.value;
                        
                        try {
                            const docRef = doc(db, "interventii", docId);
                            // Actualizăm câmpul 'status' în Firestore
                            await updateDoc(docRef, {
                                status: noulStatus
                            });
                            console.log(`Statusul tichetului ${docId} a fost actualizat la: ${noulStatus}`);
                            alert(`Status schimbat cu succes în: "${noulStatus}"`);
                            
                            // Reîncărcăm pagina discret pentru a aplica noile culori/stiluri
                            location.reload();
                        } catch (error) {
                            console.error("Eroare la actualizarea statusului:", error);
                            alert("Nu aveți permisiunea de a modifica acest status.");
                        }
                    });
                });

            } catch (error) {
                console.error("Eroare preluare date:", error);
                document.getElementById('ticheteContainer').innerHTML = "<p style='color: #d9534f;'>Eroare la încărcarea solicitărilor.</p>";
            }
        }

        // Deconectare (Log Out)
        document.getElementById('btnDeconectare').addEventListener('click', () => {
            signOut(auth).then(() => {
                window.location.href = "login.html";
            }).catch((error) => {
                console.error("Eroare delogare:", error);
            });
        });
    </script>
</body>
</html>
