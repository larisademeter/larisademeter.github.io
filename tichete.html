<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tichetele Mele | L.D. Service Medical</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Suprascriere stiluri specifice pentru integrarea cromaticii brandului (Turcoaz, Mov, Roz) */
        body {
            background-color: #f7f5f9; /* Un fundal foarte deschis cu tentă caldă de mov/gri */
        }
        
        .brand-title {
            color: #333;
            font-weight: 800;
        }

        /* Cardurile de tichete restilizate */
        .ticket-card {
            background: #ffffff;
            padding: 25px;
            margin-bottom: 25px;
            border-radius: 16px;
            box-shadow: 0 10px 20px rgba(142, 68, 173, 0.05); /* Umbră discretă violet */
            border-left: 6px solid #00c2b2; /* Margine accent Turcoaz */
            border-top: 1px solid #f1ebf7;
            border-right: 1px solid #f1ebf7;
            border-bottom: 1px solid #f1ebf7;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .ticket-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 24px rgba(142, 68, 173, 0.1);
        }

        /* Detaliile secundare (secție, clinică, motiv etc.) sub formă de tag-uri elegante */
        .info-badge {
            display: inline-flex;
            align-items: center;
            background: #f2eff6; /* Mov extrem de deschis */
            color: #7b2cbf; /* Text Mov */
            padding: 5px 12px;
            border-radius: 8px;
            font-size: 0.85em;
            font-weight: 600;
            margin-right: 10px;
            margin-bottom: 8px;
        }

        .info-badge-turcoaz {
            display: inline-flex;
            align-items: center;
            background: #e6faf8; /* Turcoaz deschis */
            color: #008f83; /* Text Turcoaz închis */
            padding: 5px 12px;
            border-radius: 8px;
            font-size: 0.85em;
            font-weight: 600;
            margin-right: 10px;
            margin-bottom: 8px;
        }

        /* Stil pentru meniurile derulante de schimbare status (Tehnicieni/Admin) */
        .status-select {
            padding: 8px 14px;
            border-radius: 10px;
            border: 2px solid #e1d5f2;
            font-weight: 700;
            background: #ffffff;
            color: #6a1b9a; /* Text Violet */
            cursor: pointer;
            outline: none;
            transition: border-color 0.2s;
        }

        .status-select:focus {
            border-color: #00c2b2; /* Se colorează în Turcoaz la selectare */
        }
    </style>
</head>
<body>

    <header>
        <div class="container header-content">
            <a href="index.html" class="brand">
                <img src="logo.png" alt="L.D. Service Medical" class="logo">
            </a>
            <button class="menu-toggle" aria-label="Meniu">
                <span class="bar"></span>
                <span class="bar"></span>
                <span class="bar"></span>
            </button>
            <nav class="main-nav">
                <a href="index.html">Acasă</a>
                <a href="tichete.html" id="navTicheteBtn" style="font-weight: bold; color: #9c27b0;">Tichetele Mele</a>
                
                <a href="notificari.html" class="notification-bell-container">
                    <span class="notification-bell">🔔</span>
                    <span id="bellBadge" class="notification-badge nav-hidden">0</span>
                </a>

                <span id="userEmail" style="margin: 0 15px; font-weight: bold; color: #7b2cbf; font-size: 0.95em;">Se încarcă...</span>
                
                <div class="nav-auth">
                    <button id="btnDeconectare" class="btn-nav-home">Deconectare</button>
                    <a href="contact.html" class="btn-nav-contact">Contact</a>
                </div>
            </nav>
        </div>
    </header>

    <main class="section">
        <div class="container" style="max-width: 800px; margin-top: 40px; min-height: 60vh;">
            <h2 style="color: #4a154b; margin-bottom: 8px; font-weight: 800;">Intervențiile și Tichetele Mele</h2>
            <p style="color: #666; margin-bottom: 30px; font-size: 1.05em;">Monitorizează în timp real stadiul solicitărilor tale de service.</p>
            
            <div id="ticheteContainer">
                <p style="color: #888; text-align: center;">Se încarcă tichetele tale...</p>
            </div>
        </div>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 L.D. Service Medical. Partenerul tău în tehnologie medicală.</p>
        </div>
    </footer>

    <script>
        const toggle = document.querySelector('.menu-toggle');
        const nav = document.querySelector('.main-nav');
        toggle.addEventListener('click', () => {
            toggle.classList.toggle('active');
            nav.classList.toggle('active');
        });
    </script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, query, where, doc, updateDoc, onSnapshot, getDoc, addDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDJkNtiqJv5MXUe1XNPJf4lBI3KSl9ns0w",
            authDomain: "proiect-de-diploma-larisa.firebaseapp.com",
            projectId: "proiect-de-diploma-larisa",
            storageBucket: "proiect-de-diploma-larisa.firebasestorage.app",
            messagingSenderId: "1080817521080",
            appId: "1:1080817521080:web:329b2b604d2cd4056bbf4d",
            measurementId: "G-F0HM8NZCJ8"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let esteTehnicianSauAdmin = false;
        let primaIncarcare = true;
        let stariAnterioareTichete = {};

        function arataNotificare(mesaj, tip = 'success') {
            const notificareVeche = document.querySelector('.toast-notification');
            if (notificareVeche) notificareVeche.remove();

            const toast = document.createElement('div');
            toast.className = `toast-notification ${tip}`;
            toast.innerHTML = `🔔 <span>${mesaj}</span>`;
            
            document.body.appendChild(toast);

            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateY(20px)';
                setTimeout(() => toast.remove(), 300);
            }, 5000);
        }

        // Verificăm conectarea utilizatorului
        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('userEmail').innerText = user.email;
                determinaRolSiIncarca(user);
                pornesteAscultatorBadge(user);
            } else {
                window.location.href = "login.html";
            }
        });

        // Ascultă numărul de notificări necitite pentru a actualiza badge-ul roșu din header
        function pornesteAscultatorBadge(user) {
            const notificariRef = collection(db, "notificari");
            const q = query(notificariRef, where("destinatarId", "==", user.uid), where("citita", "==", false));
            
            onSnapshot(q, (querySnapshot) => {
                const badge = document.getElementById('bellBadge');
                const necititeCount = querySnapshot.size;
                
                if (necititeCount > 0) {
                    badge.innerText = necititeCount;
                    badge.classList.remove('nav-hidden');
                } else {
                    badge.classList.add('nav-hidden');
                }
            });
        }

        // Verificăm rolurile și stabilim ce tichete aducem
        async function determinaRolSiIncarca(user) {
            const email = user.email.toLowerCase();
            const ticheteRef = collection(db, "interventii");
            let q;

            if (email === "tehnician1@licenta.ro" || email === "tehnician2@licenta.ro" || email === "admin@licenta.ro") {
                esteTehnicianSauAdmin = true;
            } else {
                esteTehnicianSauAdmin = false;
            }

            if (email === "tehnician1@licenta.ro") {
                q = query(ticheteRef, where("echipament", "in", ["injectomat", "electrocauter", "monitor_triaj"]));
            } else if (email === "tehnician2@licenta.ro") {
                q = query(ticheteRef, where("echipament", "in", ["infuzomat", "ploscar", "oxigen"]));
            } else if (email === "admin@licenta.ro") {
                q = query(ticheteRef);
            } else {
                q = query(ticheteRef, where("userId", "==", user.uid));
            }

            afiseazaTichete(q);
        }

        // Ascultăm și randăm tichetele în timp real (onSnapshot)
        function afiseazaTichete(interogare) {
            const container = document.getElementById('ticheteContainer');
            
            onSnapshot(interogare, (querySnapshot) => {
                container.innerHTML = "";

                if (querySnapshot.empty) {
                    container.innerHTML = `
                        <div style="background: #fdfbfe; padding: 40px; border-radius: 16px; text-align: center; border: 2px dashed #e1d5f2; color: #7b2cbf;">
                            <span style="font-size: 2.5em; display:block; margin-bottom:10px;">📋</span>
                            Nu există nicio intervenție înregistrată în această secțiune.
                        </div>`;
                    primaIncarcare = false;
                    return;
                }

                querySnapshot.forEach((docSnap) => {
                    const dateTichet = docSnap.data();
                    const card = document.createElement('div');
                    card.className = "ticket-card";
                    
                    const statusActual = dateTichet.status || 'În așteptare';
                    const idTichet = docSnap.id;
                    const numeEchipament = dateTichet.echipament || 'Echipament Nespecificat';

                    // --- DETECTARE SCHIMBĂRI PENTRU TOAST NOTIFICATIONS ---
                    if (!primaIncarcare) {
                        if (esteTehnicianSauAdmin) {
                            if (!stariAnterioareTichete[idTichet]) {
                                arataNotificare(`A apărut o solicitare nouă pentru: ${numeEchipament}!`, 'alert');
                            }
                        } else {
                            const stareaVeche = stariAnterioareTichete[idTichet];
                            if (stareaVeche && stareaVeche !== statusActual) {
                                arataNotificare(`Statusul solicitării (${numeEchipament}) a fost schimbat în: "${statusActual}"!`, 'success');
                            }
                        }
                    }

                    stariAnterioareTichete[idTichet] = statusActual;

                    // --- DESIGN BADGE STATUS ---
                    let statusColor = "#008f83"; 
                    let statusBg = "#e6faf8";    
                    
                    if (statusActual === "În curs de rezolvare") {
                        statusColor = "#9c27b0"; 
                        statusBg = "#f3e5f5";    
                    } else if (statusActual === "Nouă") {
                        statusColor = "#ff4081"; 
                        statusBg = "#fce4ec";    
                    }

                    let statusElementHTML = "";
                    if (esteTehnicianSauAdmin) {
                        statusElementHTML = `
                            <div style="display: flex; align-items: center; gap: 10px;">
                                <span style="font-size: 0.85em; font-weight: bold; color: #7b2cbf;">Status:</span>
                                <select class="status-select" data-id="${idTichet}">
                                    <option value="Nouă" ${statusActual === "Nouă" ? "selected" : ""}>Nouă</option>
                                    <option value="În curs de rezolvare" ${statusActual === "În curs de rezolvare" ? "selected" : ""}>În curs de rezolvare</option>
                                    <option value="Rezolvată" ${statusActual === "Rezolvată" ? "selected" : ""}>Rezolvată</option>
                                </select>
                            </div>
                        `;
                    } else {
                        statusElementHTML = `
                            <span style="background: ${statusBg}; color: ${statusColor}; padding: 6px 14px; border-radius: 50px; font-size: 0.85em; font-weight: 800; text-transform: uppercase; letter-spacing: 0.5px;">
                                ${statusActual}
                            </span>
                        `;
                    }

                    const sectia = dateTichet.sectie ? dateTichet.sectie : "Nespecificată";
                    const motivul = dateTichet.motiv === "service" ? "Reparație (Defect)" : "Mentenanță periodică";
                    const dataSolicitare = dateTichet.data_solicitare ? dateTichet.data_solicitare : "Fără dată";

                    card.innerHTML = `
                        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 18px; flex-wrap: wrap; gap: 10px;">
                            <h3 style="margin: 0; color: #4a154b; font-size: 1.35em; font-weight: 800;">🩺 ${numeEchipament}</h3>
                            ${statusElementHTML}
                        </div>

                        <div style="margin-bottom: 15px;">
                            <span class="info-badge-turcoaz">🏢 ${dateTichet.clinica || 'Nespecificată'}</span>
                            <span class="info-badge">📍 Secție: ${sectia}</span>
                            <span class="info-badge">🔧 Tip: ${motivul}</span>
                        </div>

                        <div style="background: #faf8fc; padding: 15px; border-radius: 10px; margin-bottom: 15px; border-left: 3px solid #ff4081;">
                            <strong style="color: #4a154b; font-size: 0.9em; display: block; margin-bottom: 5px;">Descriere detaliată problemă:</strong>
                            <p style="margin: 0; color: #444; line-height: 1.6; font-size: 0.95em;">${dateTichet.mesaj || 'Fără detalii suplimentare înregistrate.'}</p>
                        </div>

                        <div style="padding-top: 12px; border-top: 1px dashed #e1d5f2; display: flex; justify-content: space-between; font-size: 0.8em; color: #8c7b99; font-weight: 600;">
                            <span>🆔 ID Solicitare: ${idTichet}</span>
                            <span>📅 Data: ${dataSolicitare}</span>
                        </div>
                    `;
                    container.appendChild(card);
                });

                primaIncarcare = false;

                // Actualizare status dropdown + Trimitere notificare dedicată clientului
                document.querySelectorAll('.status-select').forEach(select => {
                    select.addEventListener('change', async (e) => {
                        const docId = e.target.getAttribute('data-id');
                        const noulStatus = e.target.value;
                        
                        try {
                            const docRef = doc(db, "interventii", docId);
                            await updateDoc(docRef, {
                                status: noulStatus
                            });

                            const snapshotTichet = await getDoc(docRef);
                            if (snapshotTichet.exists()) {
                                const dateTichet = snapshotTichet.data();
                                const notificariRef = collection(db, "notificari");
                                
                                await addDoc(notificariRef, {
                                    destinatarId: dateTichet.userId,
                                    mesaj: `Statusul solicitării dumneavoastră pentru "${dateTichet.echipament || 'Echipament'}" a fost modificat în: "${noulStatus}".`,
                                    citita: false,
                                    data: new Date(),
                                    dataFormata: new Date().toLocaleString('ro-RO')
                                });
                            }
                        } catch (error) {
                            console.error("Eroare update status sau trimitere notificare:", error);
                            alert("Eroare la modificarea statusului.");
                        }
                    });
                });

            }, (error) => {
                console.error("Eroare ascultare în timp real:", error);
                document.getElementById('ticheteContainer').innerHTML = "<p style='color: #d9534f; text-align: center;'>Eroare la încărcarea datelor în timp real.</p>";
            });
        }

        // Delogare cu redirecționare directă spre index.html
        document.getElementById('btnDeconectare').addEventListener('click', () => {
            signOut(auth).then(() => {
                window.location.replace("index.html");
            }).catch((error) => {
                console.error("Eroare delogare:", error);
            });
        });
    </script>
</body>
</html>
