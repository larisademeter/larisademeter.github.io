<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tichetele Mele | L.D. Service Medical</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Suprascriere stiluri specifice pentru integrarea cromaticii brandului (Turcoaz, Mov, Roz) */
        body {
            background-color: #f7f5f9; /* Un fundal foarte deschis cu tentă caldă de mov/gri */
        }
        
        .brand-title {
            color: #333;
            font-weight: 800;
        }

        /* Cardurile de tichete restilizate */
        .ticket-card {
            background: #ffffff;
            padding: 25px;
            margin-bottom: 25px;
            border-radius: 16px;
            box-shadow: 0 10px 20px rgba(142, 68, 173, 0.05); /* Umbră discretă violet */
            border-left: 6px solid #00c2b2; /* Margine accent Turcoaz */
            border-top: 1px solid #f1ebf7;
            border-right: 1px solid #f1ebf7;
            border-bottom: 1px solid #f1ebf7;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .ticket-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 24px rgba(142, 68, 173, 0.1);
        }

        /* Detaliile secundare (secție, clinică, motiv etc.) sub formă de tag-uri elegante */
        .info-badge {
            display: inline-flex;
            align-items: center;
            background: #f2eff6; /* Mov extrem de deschis */
            color: #7b2cbf; /* Text Mov */
            padding: 5px 12px;
            border-radius: 8px;
            font-size: 0.85em;
            font-weight: 600;
            margin-right: 10px;
            margin-bottom: 8px;
        }

        .info-badge-turcoaz {
            display: inline-flex;
            align-items: center;
            background: #e6faf8; /* Turcoaz deschis */
            color: #008f83; /* Text Turcoaz închis */
            padding: 5px 12px;
            border-radius: 8px;
            font-size: 0.85em;
            font-weight: 600;
            margin-right: 10px;
            margin-bottom: 8px;
        }

        /* Stil pentru meniurile derulante de schimbare status (Tehnicieni/Admin) */
        .status-select {
            padding: 8px 14px;
            border-radius: 10px;
            border: 2px solid #e1d5f2;
            font-weight: 700;
            background: #ffffff;
            color: #6a1b9a; /* Text Violet */
            cursor: pointer;
            outline: none;
            transition: border-color 0.2s;
        }

        .status-select:focus {
            border-color: #00c2b2; /* Se colorează în Turcoaz la selectare */
        }

        /* Butonul de deconectare adaptat cromatic (gradient Roz/Mov) */
        .btn-logout {
            background: linear-gradient(135deg, #ff4081, #9c27b0); /* Roz -> Mov */
            border: none;
            cursor: pointer;
            padding: 10px 20px;
            border-radius: 25px;
            color: white;
            font-weight: bold;
            transition: opacity 0.2s;
        }

        .btn-logout:hover {
            opacity: 0.9;
        }
    </style>
</head>
<body>

    <header>
        <div class="container header-content">
            <a href="index.html" class="brand">
                <img src="logo.png" alt="L.D. Service Medical" class="logo">
            </a>
            <button class="menu-toggle" aria-label="Meniu">
                <span class="bar"></span>
                <span class="bar"></span>
                <span class="bar"></span>
            </button>
            <nav class="main-nav">
                <a href="index.html" style="color: #00c2b2; font-weight: bold; text-transform: uppercase; font-size: 0.9em; letter-spacing: 1px;">Acasă</a>
                <span id="userEmail" style="margin: 0 15px; font-weight: bold; color: #7b2cbf; font-size: 0.95em;">Se încarcă...</span>
                <button id="btnDeconectare" class="btn-logout">Deconectare</button>
            </nav>
        </div>
    </header>

    <main class="section">
        <div class="container" style="max-width: 800px; margin-top: 40px; min-height: 60vh;">
            <h2 style="color: #4a154b; margin-bottom: 8px; font-weight: 800;">Intervențiile și Tichetele Mele</h2>
            <p style="color: #666; margin-bottom: 30px; font-size: 1.05em;">Monitorizează în timp real stadiul solicitărilor tale de service.</p>
            
            <div id="ticheteContainer">
                <p style="color: #888; text-align: center;">Se încarcă tichetele tale...</p>
            </div>
        </div>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 L.D. Service Medical. Partenerul tău în tehnologie medicală.</p>
        </div>
    </footer>

    <script>
        const toggle = document.querySelector('.menu-toggle');
        const nav = document.querySelector('.main-nav');
        toggle.addEventListener('click', () => {
            toggle.classList.toggle('active');
            nav.classList.toggle('active');
        });
    </script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, query, where, getDocs, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // Configurația ta oficială Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyDJkNtiqJv5MXUe1XNPJf4lBI3KSl9ns0w",
            authDomain: "proiect-de-diploma-larisa.firebaseapp.com",
            projectId: "proiect-de-diploma-larisa",
            storageBucket: "proiect-de-diploma-larisa.firebasestorage.app",
            messagingSenderId: "1080817521080",
            appId: "1:1080817521080:web:329b2b604d2cd4056bbf4d",
            measurementId: "G-F0HM8NZCJ8"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let esteTehnicianSauAdmin = false;

        // Verificăm conectarea utilizatorului
        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('userEmail').innerText = user.email;
                determinaRolSiIncarca(user);
            } else {
                window.location.href = "login.html";
            }
        });

        // Verificăm rolurile și stabilim ce tichete aducem
        async function determinaRolSiIncarca(user) {
            const email = user.email.toLowerCase();
            const ticheteRef = collection(db, "interventii");
            let q;

            if (email === "tehnician1@licenta.ro" || email === "tehnician2@licenta.ro" || email === "admin@licenta.ro") {
                esteTehnicianSauAdmin = true;
            } else {
                esteTehnicianSauAdmin = false;
            }

            if (email === "tehnician1@licenta.ro") {
                q = query(ticheteRef, where("echipament", "in", ["injectomat", "electrocauter", "monitor_triaj"]));
            } else if (email === "tehnician2@licenta.ro") {
                q = query(ticheteRef, where("echipament", "in", ["infuzomat", "ploscar", "oxigen"]));
            } else if (email === "admin@licenta.ro") {
                q = query(ticheteRef);
            } else {
                q = query(ticheteRef, where("userId", "==", user.uid));
            }

            afiseazaTichete(q);
        }

        // Construim cardurile elegante în pagină
        async function afiseazaTichete(interogare) {
            try {
                const container = document.getElementById('ticheteContainer');
                const querySnapshot = await getDocs(interogare);

                container.innerHTML = "";

                if (querySnapshot.empty) {
                    container.innerHTML = `
                        <div style="background: #fdfbfe; padding: 40px; border-radius: 16px; text-align: center; border: 2px dashed #e1d5f2; color: #7b2cbf;">
                            <span style="font-size: 2.5em; display:block; margin-bottom:10px;">📋</span>
                            Nu există nicio intervenție înregistrată în această secțiune.
                        </div>`;
                    return;
                }

                querySnapshot.forEach((docSnap) => {
                    const dateTichet = docSnap.data();
                    const card = document.createElement('div');
                    card.className = "ticket-card";
                    
                    const statusActual = dateTichet.status || 'În așteptare';
                    
                    // Schimbăm culorile badge-ului de status dinamic
                    let statusColor = "#008f83"; // Turcoaz închis
                    let statusBg = "#e6faf8";    // Turcoaz deschis
                    
                    if (statusActual === "În curs de rezolvare") {
                        statusColor = "#9c27b0"; // Violet/Mov
                        statusBg = "#f3e5f5";    // Violet deschis
                    } else if (statusActual === "Nouă") {
                        statusColor = "#ff4081"; // Roz vibrant
                        statusBg = "#fce4ec";    // Roz deschis
                    }

                    // Generăm HTML-ul pentru controlul de status
                    let statusElementHTML = "";
                    if (esteTehnicianSauAdmin) {
                        statusElementHTML = `
                            <div style="display: flex; align-items: center; gap: 10px;">
                                <span style="font-size: 0.85em; font-weight: bold; color: #7b2cbf;">Status:</span>
                                <select class="status-select" data-id="${docSnap.id}">
                                    <option value="Nouă" ${statusActual === "Nouă" ? "selected" : ""}>Nouă</option>
                                    <option value="În curs de rezolvare" ${statusActual === "În curs de rezolvare" ? "selected" : ""}>În curs de rezolvare</option>
                                    <option value="Rezolvată" ${statusActual === "Rezolvată" ? "selected" : ""}>Rezolvată</option>
                                </select>
                            </div>
                        `;
                    } else {
                        statusElementHTML = `
                            <span style="background: ${statusBg}; color: ${statusColor}; padding: 6px 14px; border-radius: 50px; font-size: 0.85em; font-weight: 800; text-transform: uppercase; letter-spacing: 0.5px;">
                                ${statusActual}
                            </span>
                        `;
                    }

                    // Preluăm opționalele sau le punem valori standard
                    const sectia = dateTichet.sectie ? dateTichet.sectie : "Nespecificată";
                    const motivul = dateTichet.motiv === "service" ? "Reparație (Defect)" : "Mentenanță periodică";
                    const dataSolicitare = dateTichet.data_solicitare ? dateTichet.data_solicitare : "Fără dată";

                    // Construim structura cu TOATE detaliile din baza de date
                    card.innerHTML = `
                        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 18px; flex-wrap: wrap; gap: 10px;">
                            <h3 style="margin: 0; color: #4a154b; font-size: 1.35em; font-weight: 800;">🩺 ${dateTichet.echipament || 'Echipament Nespecificat'}</h3>
                            ${statusElementHTML}
                        </div>

                        <div style="margin-bottom: 15px;">
                            <span class="info-badge-turcoaz">🏢 ${dateTichet.clinica || 'Nespecificată'}</span>
                            <span class="info-badge">📍 Secție: ${sectia}</span>
                            <span class="info-badge">🔧 Tip: ${motivul}</span>
                        </div>

                        <div style="background: #faf8fc; padding: 15px; border-radius: 10px; margin-bottom: 15px; border-left: 3px solid #ff4081;">
                            <strong style="color: #4a154b; font-size: 0.9em; display: block; margin-bottom: 5px;">Descriere detaliată problemă:</strong>
                            <p style="margin: 0; color: #444; line-height: 1.6; font-size: 0.95em;">${dateTichet.mesaj || 'Fără detalii suplimentare înregistrate.'}</p>
                        </div>

                        <div style="padding-top: 12px; border-top: 1px dashed #e1d5f2; display: flex; justify-content: space-between; font-size: 0.8em; color: #8c7b99; font-weight: 600;">
                            <span>🆔 ID Solicitare: ${docSnap.id}</span>
                            <span>📅 Data: ${dataSolicitare}</span>
                        </div>
                    `;
                    container.appendChild(card);
                });

                // Ascultător pentru când tehnicianul/adminul schimbă statusul direct pe card
                document.querySelectorAll('.status-select').forEach(select => {
                    select.addEventListener('change', async (e) => {
                        const docId = e.target.getAttribute('data-id');
                        const noulStatus = e.target.value;
                        
                        try {
                            const docRef = doc(db, "interventii", docId);
                            await updateDoc(docRef, {
                                status: noulStatus
                            });
                            alert(`Status actualizat cu succes în: "${noulStatus}"`);
                            location.reload();
                        } catch (error) {
                            console.error("Eroare update status:", error);
                            alert("Eroare la modificarea statusului.");
                        }
                    });
                });

            } catch (error) {
                console.error("Eroare preluare date:", error);
                document.getElementById('ticheteContainer').innerHTML = "<p style='color: #d9534f; text-align: center;'>Eroare la încărcarea datelor.</p>";
            }
        }

        // Delogare
        document.getElementById('btnDeconectare').addEventListener('click', () => {
            signOut(auth).then(() => {
                window.location.href = "login.html";
            }).catch((error) => {
                console.error("Eroare delogare:", error);
            });
        });
    </script>
</body>
</html>
