<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log In | L.D. Service Medical</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="container header-content">
            <a href="index.html" class="brand">
                <img src="logo.png" alt="L.D. Service Medical" class="logo">
            </a>
            <button class="menu-toggle" aria-label="Meniu">
                <span class="bar"></span>
                <span class="bar"></span>
                <span class="bar"></span>
            </button>
            <nav class="main-nav">
                <a href="index.html">Acasă</a>
                <a href="index.html#servicii">Servicii</a>
                <div class="nav-auth">
                    <a href="contact.html" class="btn-nav-contact">Contact</a>
                </div>
            </nav>
        </div>
    </header>

    <main class="section bg-login">
        <div class="container">
            <div class="login-split">
                
                <div class="login-visual">
                    <div class="visual-content">
                        <div class="visual-icon">🔐</div>
                        <h3>Acces Portal</h3>
                        <p>Autentifică-te pentru a gestiona solicitările de service și a accesa istoricul tehnic.</p>
                    </div>
                </div>

                <div class="login-form-panel">
                    <h2 class="form-title">Autentificare</h2>
                    <p class="subtitle-form">Introdu datele de acces în portal.</p>
                    
                    <form class="login-form" id="loginForm">
                        
                        <div class="form-group">
                            <label for="email">E-mail Profesional</label>
                            <input type="email" id="email" name="email" placeholder="nume@clinica.ro" required>
                        </div>

                        <div class="form-group">
                            <label for="parola">Parolă</label>
                            <input type="password" id="parola" name="parola" placeholder="********" required>
                        </div>

                        <button type="submit" class="btn-full">Intră în cont</button>
                    </form>
                </div>

            </div>
        </div>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 L.D. Service Medical. Partenerul tău în tehnologie medicală.</p>
        </div>
    </footer>

    <script>
        const toggle = document.querySelector('.menu-toggle');
        const nav = document.querySelector('.main-nav');
        toggle.addEventListener('click', () => {
            toggle.classList.toggle('active');
            nav.classList.toggle('active');
        });
    </script>

    <script type="module">
        // Importăm SDK-ul necesar pentru autentificare direct din CDN-ul oficial Firebase (v10)
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        // Configurația proiectului tău Firebase "proiect-de-diploma-larisa"
        // TODO: Completează aceste valori cu datele tale din consola Firebase (Settings -> Project Settings)
        const firebaseConfig = {
            apiKey: "AICI_COPIEZI_API_KEY_UL_TAU",
            authDomain: "proiect-de-diploma-larisa.firebaseapp.com",
            projectId: "proiect-de-diploma-larisa",
            storageBucket: "proiect-de-diploma-larisa.appspot.com",
            messagingSenderId: "AICI_COPIEZI_MESSAGING_SENDER_ID",
            appId: "AICI_COPIEZI_APP_ID"
        };

        // Inițializăm aplicația și serviciul de Autentificare
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // Selectăm elementele formularului tău din HTML
        const form = document.getElementById('loginForm');
        const emailInput = document.getElementById('email');
        const parolaInput = document.getElementById('parola');

        // Ascultăm când utilizatorul apasă pe butonul de Log-in
        form.addEventListener('submit', async (e) => {
            e.preventDefault(); // Împiedicăm reîncărcarea paginii HTML

            const email = emailInput.value;
            const parola = parolaInput.value;

            try {
                // Încercăm logarea în Firebase cu email și parolă
                const userCredential = await signInWithEmailAndPassword(auth, email, parola);
                const user = userCredential.user;
                
                console.log("Te-ai conectat cu succes! Email:", user.email);
                
                // Dacă logarea are succes, trimitem utilizatorul către pagina lui privată de tichete
                window.location.href = "tichete.html";

            } catch (error) {
                console.error("Eroare autentificare:", error.code, error.message);
                
                // Tratăm erorile comune pentru a-i arăta utilizatorului un mesaj clar
                if (error.code === 'auth/invalid-credential' || error.code === 'auth/wrong-password') {
                    alert("Datele de conectare sunt incorecte. Verifică email-ul sau parola.");
                } else if (error.code === 'auth/user-not-found') {
                    alert("Nu există un cont cu această adresă de email.");
                } else {
                    alert("Eroare la conectare: " + error.message);
                }
            }
        });
    </script>
</body>
</html>
